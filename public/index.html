<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATH Tracker</title>
  <!-- v2 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --bg2: #0f0f1a;
      --card: #12121e;
      --card-border: #1e1e30;
      --text: #f0f0f8;
      --muted: #555570;
      --green: #00e676;
      --red: #ff4060;
      --accent: #7c6bff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 48px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 30%, #7c6bff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 8px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    #updated {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 999px;
      padding: 4px 14px;
    }

    #refresh-btn {
      margin-top: 4px;
      background: var(--card);
      border: 1px solid var(--card-border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 22px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }
    #refresh-btn:hover {
      background: var(--card-border);
      border-color: var(--accent);
      color: #fff;
    }
    #refresh-btn:active {
      transform: scale(0.97);
    }
    #refresh-btn.spinning {
      opacity: 0.6;
      pointer-events: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 28px 28px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    /* top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--stock-color);
      border-radius: 24px 24px 0 0;
    }

    /* ambient glow */
    .card-glow {
      position: absolute;
      top: -80px; right: -80px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: var(--pct-color);
      opacity: 0.05;
      filter: blur(60px);
      pointer-events: none;
      transition: background 0.5s;
    }

    /* ── TOP ROW: logo + name + badge ── */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .ticker-info { display: flex; align-items: center; gap: 12px; }

    .ticker-logo {
      width: 40px; height: 40px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800;
      color: #fff;
      background: var(--stock-color);
    }

    .ticker-name { font-weight: 700; font-size: 1rem; line-height: 1.2; }
    .ticker-symbol { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }

    .market-badge {
      font-size: 0.67rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .market-badge.open   { background: rgba(0,230,118,0.12); color: var(--green); }
    .market-badge.closed { background: rgba(255,64,96,0.12);  color: var(--red); }
    .market-badge.pre    { background: rgba(124,107,255,0.12); color: var(--accent); }
    .market-badge.post   { background: rgba(255,153,0,0.12);   color: #ff9900; }

    /* ── HERO: % from ATH ── */
    .hero-pct {
      text-align: center;
      margin: 8px 0 8px;
      line-height: 1;
    }

    .hero-pct-number {
      font-size: clamp(2.4rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--pct-color);
      transition: color 0.5s;
      display: block;
      white-space: nowrap;
      overflow: visible;
    }

    .hero-pct-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 5px;
      display: block;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      margin: 18px 0 20px;
    }

    .progress-track {
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--pct-color);
      transition: width 1s cubic-bezier(0.4,0,0.2,1), background 0.5s;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.68rem;
      color: var(--muted);
    }

    /* ── CHART ── */
    .chart-wrap {
      position: relative;
      height: 100px;
      margin-bottom: 18px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg2);
      padding: 8px 8px 4px;
    }

    /* ── SECONDARY STATS ── */
    .secondary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
    }

    .sec-item { text-align: center; }
    .sec-label {
      font-size: 0.63rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .sec-value {
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 3px;
      color: var(--text);
    }
    .sec-value.up   { color: var(--green); }
    .sec-value.down { color: var(--red); }

    .sep {
      width: 1px;
      height: 30px;
      background: var(--card-border);
    }

    /* ── MISC ── */
    .error-msg {
      text-align: center;
      padding: 60px;
      color: var(--red);
      grid-column: 1/-1;
    }

    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--muted);
      font-size: 0.72rem;
    }

    @media (max-width: 480px) {
      body { padding: 28px 12px 40px; }
      .card { padding: 22px 20px 18px; }
    }
  </style>
</head>
<body>

<header>
  <h1>ATH Tracker</h1>
  <p>Distance from all-time high</p>
  <span id="updated">Loading…</span>
  <br><br>
  <button onclick="refresh()" id="refresh-btn">↻ Refresh</button>
</header>

<div class="grid" id="grid"></div>

<footer>Data via Yahoo Finance · Refreshes every 30s · All values in USD</footer>

<script>
const LOGOS = { META:'M', GOOGL:'G', TSLA:'T', AMZN:'A', MSFT:'M', NVDA:'N' };

function fmt(n, d=2) {
  return n == null ? '-' : n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtVol(n) {
  if (!n) return '-';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  return n.toLocaleString();
}

function pctColor(pct) {
  if (pct >= 0)    return '#00e676';   // at or above ATH - green
  if (pct >= -10)  return '#00e676';   // within 10% - green
  if (pct >= -20)  return '#ffd740';   // 10-20% down - yellow
  return '#ff4060';                    // >20% down - red
}

function marketLabel(state) {
  if (!state) return '';
  const s = state.toUpperCase();
  if (s === 'REGULAR') return '<span class="market-badge open">Open</span>';
  if (s === 'CLOSED')  return '<span class="market-badge closed">Closed</span>';
  if (s === 'PRE')     return '<span class="market-badge pre">Pre</span>';
  if (s === 'POST')    return '<span class="market-badge post">After-hours</span>';
  return `<span class="market-badge closed">${state}</span>`;
}

function buildCard(s) {
  const isUp   = s.pctFromATH >= 0;
  const sign   = isUp ? '+' : '';
  const pc     = pctColor(s.pctFromATH);
  const progress = Math.min(100, Math.max(0, (s.current / s.ath) * 100));
  const dayUp  = s.changePct >= 0;

  return `
  <div class="card" style="--stock-color:${s.color}; --pct-color:${pc}">
    <div class="card-glow"></div>

    <div class="card-top">
      <div class="ticker-info">
        <div class="ticker-logo">${LOGOS[s.ticker] || s.ticker[0]}</div>
        <div>
          <div class="ticker-name">${s.name}</div>
          <div class="ticker-symbol">${s.ticker}</div>
        </div>
      </div>
      ${marketLabel(s.marketState)}
    </div>

    <!-- HERO % -->
    <div class="hero-pct">
      <span class="hero-pct-number">${sign}${fmt(s.pctFromATH)}%</span>
      <span class="hero-pct-label">from all-time high</span>
    </div>

    <!-- PROGRESS: current vs ATH -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="progress-labels">
        <span>$${fmt(s.current)} now</span>
        <span>ATH $${fmt(s.ath)}</span>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart-wrap">
      <canvas id="chart-${s.ticker}"></canvas>
    </div>

    <!-- SECONDARY STATS -->
    <div class="secondary">
      <div class="sec-item">
        <div class="sec-label">Today</div>
        <div class="sec-value ${dayUp ? 'up' : 'down'}">${dayUp ? '+' : ''}${fmt(s.changePct)}%</div>
      </div>
      <div class="sep"></div>
      <div class="sec-item">
        <div class="sec-label">This Week</div>
        <div class="sec-value ${s.weekChangePct >= 0 ? 'up' : 'down'}">${s.weekChangePct != null ? (s.weekChangePct >= 0 ? '+' : '') + fmt(s.weekChangePct) + '%' : '-'}</div>
      </div>
      <div class="sep"></div>
      <div class="sec-item">
        <div class="sec-label">High</div>
        <div class="sec-value">$${fmt(s.high)}</div>
      </div>
      <div class="sep"></div>
      <div class="sec-item">
        <div class="sec-label">Low</div>
        <div class="sec-value">$${fmt(s.low)}</div>
      </div>
    </div>
  </div>`;
}

/* ── Charts ── */
const charts = {};

async function loadChart(ticker, ath) {
  try {
    const res = await fetch(`/api/history/${ticker}`);
    if (!res.ok) return;
    const { history } = await res.json();
    if (!history?.length) return;

    const canvas = document.getElementById(`chart-${ticker}`);
    if (!canvas) return;
    if (charts[ticker]) charts[ticker].destroy();

    const labels = history.map(d => d.date);
    const prices = history.map(d => d.close);

    // Whole line is red if current price is below ATH, green if at/above
    const lineColor = prices[prices.length - 1] >= ath ? '#00e676' : '#ff4060';

    charts[ticker] = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            data: prices,
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            fill: false,
            tension: 0.3,
            borderColor: lineColor,
            backgroundColor: 'transparent',
            borderCapStyle: 'butt',
            borderJoinStyle: 'bevel',
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 500 },
        plugins: {
          legend: { display: false },
          tooltip: {
            mode: 'index', intersect: false,
            callbacks: {
              label: c => c.datasetIndex === 0
                ? ` $${c.parsed.y.toFixed(2)}`
                : ` ATH $${ath}`,
            },
          },
        },
        scales: {
          x: { display: false },
          y: { display: false },
        },
      },
    });
  } catch(e) {
    console.warn('chart error', ticker, e);
  }
}

/* ── Main fetch ── */
async function _refresh() {
  try {
    const res = await fetch('/api/stocks');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    document.getElementById('grid').innerHTML = data.stocks.map(buildCard).join('');

    const d = new Date(data.updatedAt);
    document.getElementById('updated').textContent =
      'Updated ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    data.stocks.forEach(s => loadChart(s.ticker, s.ath));
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="error-msg">⚠️ Failed to load data<br><small>${e.message}</small></div>`;
  }
}

async function refresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = '↻ Refreshing…'; btn.classList.add('spinning'); }
  await _refresh();
  if (btn) { btn.textContent = '↻ Refresh'; btn.classList.remove('spinning'); }
}

_refresh();

</script>
</body>
</html>
